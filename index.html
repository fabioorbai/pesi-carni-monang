<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pesi Carni Monang V12</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#090909;--card:#171717;--card2:#222;--txt:#fff;--muted:#bdbdbd;--gold:#d8b35a;--green:#28c76f;--red:#ff4d4d;--blue:#2388ff;--line:#333}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:980px;margin:0 auto;padding:14px}.top{display:flex;align-items:center;gap:12px;justify-content:center}.logo{height:62px;object-fit:contain}.title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;color:var(--gold)}.status{text-align:center;margin:6px 0 14px;color:var(--green);font-weight:800}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.tab{border:1px solid var(--line);background:var(--card2);color:#fff;padding:13px 8px;border-radius:12px;font-weight:900;font-size:15px}.tab.active{background:var(--gold);color:#111}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0}.h{font-size:20px;font-weight:900;color:var(--gold);margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.btn{border:0;border-radius:12px;padding:13px 10px;font-weight:900;background:#2b2b2b;color:#fff;font-size:16px}.btn.sel{background:var(--gold);color:#111}.btn.blue{background:var(--blue)}.btn.green{background:var(--green);color:#061}.btn.red{background:var(--red);color:#fff}.btn.gold{background:var(--gold);color:#111}.btn.small{font-size:13px;padding:9px}.btn.tableBtn{min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.tableNo{font-size:20px}.steak{font-size:13px;background:rgba(255,255,255,.18);padding:2px 7px;border-radius:999px}.splitBtn{background:#ffcb45!important;color:#111!important;border:2px solid #fff!important;font-size:15px!important}.mergedTitle{font-size:16px;color:#ffcb45;margin-bottom:8px;font-weight:1000}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}input,select{width:100%;background:#0f0f0f;color:#fff;border:1px solid #444;border-radius:12px;padding:13px;font-size:18px;font-weight:800}.bigTotal{text-align:center;font-size:36px;font-weight:900;color:var(--gold);padding:12px}.item{background:#111;border:1px solid #333;border-radius:14px;padding:12px;margin:8px 0}.item.inserted{background:#073b1e;border:3px solid #28c76f;box-shadow:0 0 18px rgba(40,199,111,.45)}.insertedBanner{background:#28c76f;color:#031b0d;border-radius:12px;padding:10px;margin:8px 0;font-size:24px;font-weight:1000;text-align:center;letter-spacing:1px}.mergedDetails{background:#080808;border:1px solid #444;border-radius:12px;padding:10px;margin-top:8px}.part{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #222;padding:6px 0}.newFlash{animation:flashNew 1.6s ease-in-out 1}@keyframes flashNew{0%{box-shadow:0 0 0 rgba(255,203,69,0)}30%{box-shadow:0 0 22px rgba(255,203,69,.9);border-color:#ffcb45}100%{box-shadow:0 0 0 rgba(255,203,69,0)}}.itemHead{display:flex;justify-content:space-between;gap:8px;font-weight:900}.muted{color:var(--muted);font-size:13px}.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#333;font-size:12px}.warn{color:#ffcb45;font-weight:900}.low{border-color:#ffcb45}.hidden{display:none}.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat div{background:#111;border:1px solid #333;border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:22px;color:var(--gold)}@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}.tabs{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.title{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><img class="logo" src="logo.png"><div><div class="title">PESI CARNI MONANG V12</div><div id="status" class="status">COLLEGAMENTO...</div></div></div>
 <div class="tabs">
  <button class="tab active" onclick="show('griglia',this)">GRIGLIA</button><button class="tab" onclick="show('cassa',this)">CASSA</button><button class="tab" onclick="show('history',this)">STORICO</button><button class="tab" onclick="show('magazzino',this)">MAGAZZINO</button><button class="tab" onclick="show('admin',this)">ADMIN</button>
 </div>
 <section id="griglia"></section><section id="cassa" class="hidden"></section><section id="history" class="hidden"></section><section id="magazzino" class="hidden"></section><section id="admin" class="hidden"></section>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, writeBatch, increment } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyAfTggVVuS4atu0-k9ogfxexkUIGhY20J8",authDomain:"pesi-carni-monang.firebaseapp.com",projectId:"pesi-carni-monang",storageBucket:"pesi-carni-monang.firebasestorage.app",messagingSenderId:"957161248371",appId:"1:957161248371:web:7e11ab9dedf84563073c06"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);document.getElementById('status').textContent='ONLINE - SINCRONIZZATO';
let meats=[],orders=[],manual=[],history=[],selectedTable=null,selectedMeat=null,selectedIds=new Set(),cassaTable=null,historyTable=null;
const today=()=>new Date().toISOString().slice(0,10);const euro=n=>'€ '+(Number(n)||0).toFixed(2).replace('.',',');const total=(g,p)=>Math.round((g/100*p)*100)/100;
const defaultMeats=[['Tomahawk',7.90,0],['Fiorentina',8.50,0],['Costata',6.90,0],['T-Bone',7.50,0],['Controfiletto',8.90,0],['Filetto',9.90,0],['Picanha',6.90,0],['Entrecôte',7.50,0],['Canguro',6.50,0]];
async function seed(){const snap=await getDocs(collection(db,'meats'));if(snap.empty){for(const [name,price,stock] of defaultMeats) await addDoc(collection(db,'meats'),{name,price,stock,initialStock:stock,autoStock:true,createdAt:serverTimestamp()});}}
seed();
onSnapshot(query(collection(db,'meats'),orderBy('name')),s=>{meats=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
onSnapshot(query(collection(db,'manualStock'),orderBy('name')),s=>{manual=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
onSnapshot(query(collection(db,'history'),orderBy('closedAt','desc')),s=>{history=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
window.show=(id,el)=>{document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderAll();};
function activeOrders(){return orders.filter(o=>o.day===today()&&!o.paid)}
function tableHas(t){return activeOrders().some(o=>String(o.table)===String(t))}
function tableOrders(t){return activeOrders().filter(o=>String(o.table)===String(t))}function tableCount(t){return tableOrders(t).reduce((sum,o)=>sum+(o.mergedParts?.length||1),0)}function tableState(t){const l=tableOrders(t);if(!l.length)return 'free';return l.some(o=>!o.inserted)?'pending':'inserted'}
function renderGriglia(){let html='<div class="card"><div class="h">1. Tavolo</div><div class="grid">';for(let i=1;i<=30;i++){const cnt=tableCount(i);const state=tableState(i);const stateClass=state==='pending'?'blue':state==='inserted'?'green':'';html+=`<button class="btn tableBtn ${selectedTable==i?'sel':''} ${stateClass}" onclick="selTable(${i})"><span class="tableNo">${i}</span>${cnt?`<span class="steak">🥩 ${cnt}${state==='inserted'?' · INSERITO':''}</span>`:''}</button>`;}html+='</div></div><div class="card"><div class="h">2. Carne</div><div class="grid">';meats.forEach(m=>html+=`<button class="btn ${selectedMeat===m.id?'sel':''}" onclick="selMeat('${m.id}')">${m.name}<br><span class="muted">${euro(m.price)}/etto ${m.stock<=2?'⚠️':''}</span></button>`);html+=`</div></div><div class="card"><div class="h">3. Peso</div><input id="peso" type="number" inputmode="numeric" placeholder="Grammi" oninput="calcPreview()"><div id="preview" class="bigTotal">€ 0,00</div><button class="btn gold" style="width:100%" onclick="sendOrder()">INVIA ALLA CASSA</button></div>`;if(selectedTable){const list=orders.filter(o=>String(o.table)===String(selectedTable)&&o.day===today()&&!o.paid);html+=`<div class="card"><div class="h">Storico tavolo ${selectedTable}</div>${list.length?list.map(orderHtml).join(''):'<div class="muted">Nessuna carne attiva</div>'}</div>`}document.getElementById('griglia').innerHTML=html;calcPreview();}
window.selTable=t=>{selectedTable=t;renderAll()};window.selMeat=id=>{selectedMeat=id;renderAll()};window.calcPreview=()=>{const m=meats.find(x=>x.id===selectedMeat);const g=Number(document.getElementById('peso')?.value||0);const p=document.getElementById('preview');if(p)p.textContent=euro(m?total(g,m.price):0)};
window.sendOrder=async()=>{const m=meats.find(x=>x.id===selectedMeat);const g=Number(document.getElementById('peso')?.value||0);if(!selectedTable||!m||!g)return alert('Seleziona tavolo, carne e peso');const existing=tableOrders(selectedTable);if(existing.length&&existing.every(o=>o.inserted)){const scelta=prompt(`⚠️ Il tavolo ${selectedTable} ha già un conto aperto con ${tableCount(selectedTable)} carni.\n\n1 = Continua sul conto attuale\n2 = Nuovo conto e archivia il precedente\n3 = Annulla`,'1');if(scelta==='2'){await archiveTable(selectedTable,'new_account');}else if(scelta!=='1'){return;}}await addDoc(collection(db,'orders'),{day:today(),table:selectedTable,meatId:m.id,meat:m.name,price:m.price,grams:g,total:total(g,m.price),paid:false,inserted:false,createdAt:serverTimestamp(),createdMs:Date.now()});await updateDoc(doc(db,'meats',m.id),{stock:increment(-1),soldToday:increment(1)});document.getElementById('peso').value='';calcPreview();};
function orderHtml(o,check=false){
 const details=o.mergedParts?.length?`<div class="mergedDetails"><div class="mergedTitle">📋 Peso unito: ${o.mergedParts.length} pesi</div>${o.mergedParts.map((p,i)=>`<div class="part"><span>${i+1}. ${p.meat||o.meat}</span><span>${p.grams} g · ${euro(p.total||total(p.grams,p.price||o.price))}</span></div>`).join('')}<div class="actions"><button class="btn small splitBtn" onclick="splitMerged('${o.id}')">🔓 DIVIDI PESI</button></div></div>`:'';
 return `<div class="item ${o.inserted?'inserted':''}"><div class="itemHead"><span>${check?`<input type="checkbox" ${selectedIds.has(o.id)?'checked':''} onchange="tog('${o.id}',this.checked)">`:''} Tavolo ${o.table} - ${o.meat}</span><span>${euro(o.total)}</span></div>${o.inserted?'<div class="insertedBanner">✅ INSERITO IN CASSA</div>':''}<div class="muted">${o.grams} g · ${euro(o.price)}/etto · ${fmtTime(o.createdAt)} ${o.merged?'· UNITO':''}</div>${details}<div class="actions"><button class="btn small green" onclick="markInserted('${o.id}')">INSERITO</button><button class="btn small" onclick="editOrder('${o.id}')">Modifica</button><button class="btn small" onclick="changeTable('${o.id}')">Cambia tavolo</button><button class="btn small red" onclick="delOrder('${o.id}')">Elimina</button></div></div>`}
function fmtTime(ts){try{const d=ts?.toDate?ts.toDate():new Date(ts||Date.now());return d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}catch(e){return ''}}
function arrivalValue(o){try{return o.createdMs||(o.createdAt?.toMillis?o.createdAt.toMillis():new Date(o.createdAt||0).getTime())}catch(e){return 0}}
function renderCassa(){const all=activeOrders().sort((a,b)=>arrivalValue(a)-arrivalValue(b));const pending=all.filter(o=>!o.inserted);let html='<div class="card"><div class="h">Da inserire in cassa</div>';html+=pending.length?pending.map(o=>orderHtml(o,true)).join(''):'<div class="muted">Nessun ordine da inserire</div>';html+=`<div class="actions"><button class="btn gold" onclick="mergeSelected()">UNISCI SELEZIONATI</button></div></div><div class="card"><div class="h">Tavoli attivi</div><div class="grid">`;for(let i=1;i<=30;i++){const l=all.filter(o=>String(o.table)===String(i));const cnt=l.reduce((s,o)=>s+(o.mergedParts?.length||1),0);const pendingCnt=l.filter(o=>!o.inserted).reduce((s,o)=>s+(o.mergedParts?.length||1),0);const tot=l.reduce((s,o)=>s+(o.total||0),0);const stateClass=pendingCnt?'blue':cnt?'green':'';html+=`<button class="btn tableBtn ${cassaTable==i?'sel':''} ${stateClass}" onclick="selCassaTable(${i})"><span class="tableNo">${i}</span>${cnt?`<span class="steak">🥩 ${cnt}${pendingCnt?` · DA INSERIRE ${pendingCnt}`:' · INSERITO'}</span><span class="muted">${euro(tot)}</span>`:'<span class="muted">libero</span>'}</button>`;}html+='</div>';if(cassaTable){const l=all.filter(o=>String(o.table)===String(cassaTable));html+=`<div class="item"><b>Dettaglio Tavolo ${cassaTable}</b><div class="muted">${l.length?`${l.length} righe · ${euro(l.reduce((s,o)=>s+o.total,0))}`:'Nessuna carne attiva'}</div>${l.length?l.map(o=>orderHtml(o,false)).join(''):''}${l.length?`<div class="actions"><button class="btn green small" onclick="payTable(${cassaTable})">Pagato / libera tavolo</button></div>`:''}</div>`;}html+='</div>';document.getElementById('cassa').innerHTML=html;}
window.selCassaTable=t=>{cassaTable=t;renderAll()};window.tog=(id,val)=>{val?selectedIds.add(id):selectedIds.delete(id)};window.markInserted=async id=>{selectedIds.delete(id);await updateDoc(doc(db,'orders',id),{inserted:true});};
window.changeTable=async id=>{const n=prompt('Nuovo tavolo (1-30)');if(n&&Number(n)>=1&&Number(n)<=30)await updateDoc(doc(db,'orders',id),{table:Number(n)});};
window.editOrder=async id=>{const o=orders.find(x=>x.id===id);if(!o)return;const lista=meats.map((m,i)=>`${i+1}) ${m.name} - ${euro(m.price)}/etto`).join('\n');const currentIndex=meats.findIndex(m=>m.id===o.meatId);const scelta=prompt('Scegli carne scrivendo il numero:\n\n'+lista,currentIndex>=0?currentIndex+1:1);if(!scelta)return;const m=meats[Number(scelta)-1];if(!m)return alert('Scelta non valida');const g=Number(prompt('Peso grammi',o.grams));if(!g)return;await updateDoc(doc(db,'orders',id),{meat:m.name,meatId:m.id,price:m.price,grams:g,total:total(g,m.price)});};
window.delOrder=async id=>{const o=orders.find(x=>x.id===id);if(confirm('Eliminare ordine?')){await deleteDoc(doc(db,'orders',id));if(o?.meatId)await updateDoc(doc(db,'meats',o.meatId),{stock:increment(1),soldToday:increment(-1)});}};
async function archiveTable(t,reason='paid'){const list=activeOrders().filter(o=>String(o.table)===String(t));if(!list.length)return false;const openedMs=Math.min(...list.map(o=>arrivalValue(o)||Date.now()));const items=list.map(o=>({orderId:o.id,meat:o.meat,meatId:o.meatId||null,price:o.price||0,grams:o.grams||0,total:o.total||0,inserted:!!o.inserted,merged:!!o.merged,mergedParts:o.mergedParts||[]}));const batch=writeBatch(db);const hRef=doc(collection(db,'history'));batch.set(hRef,{table:Number(t),day:today(),openedMs,openedAt:new Date(openedMs).toISOString(),closedAt:serverTimestamp(),closeReason:reason,items,total:list.reduce((s,o)=>s+Number(o.total||0),0)});list.forEach(o=>batch.update(doc(db,'orders',o.id),{paid:true,paidAt:serverTimestamp(),closeReason:reason,historyId:hRef.id}));await batch.commit();return true;}
window.payTable=async t=>{if(!confirm('Archiviare il conto e liberare tavolo '+t+'?'))return;await archiveTable(t,'paid');cassaTable=null;};
window.mergeSelected=async()=>{const ids=[...selectedIds];if(ids.length<2)return alert('Seleziona almeno 2 righe');const sel=orders.filter(o=>ids.includes(o.id)).sort((a,b)=>arrivalValue(a)-arrivalValue(b));const first=sel[0];if(!sel.every(o=>String(o.table)===String(first.table)))return alert('Puoi unire solo pesi dello stesso tavolo');const grams=sel.reduce((s,o)=>s+Number(o.grams),0);const tot=sel.reduce((s,o)=>s+Number(o.total),0);const parts=sel.map(o=>({table:o.table,meatId:o.meatId,meat:o.meat,price:o.price,grams:o.grams,total:o.total,inserted:o.inserted||false,day:o.day}));await addDoc(collection(db,'orders'),{day:today(),table:first.table,meatId:first.meatId,meat:first.meat+' x'+sel.length,price:first.price,grams,total:tot,paid:false,inserted:sel.every(o=>o.inserted),createdAt:serverTimestamp(),createdMs:Date.now(),merged:true,mergedParts:parts});const batch=writeBatch(db);sel.forEach(o=>batch.delete(doc(db,'orders',o.id)));await batch.commit();selectedIds.clear();};
window.splitMerged=async(id)=>{const o=orders.find(x=>x.id===id);if(!o?.mergedParts?.length)return alert('Nessun dettaglio da separare');if(!confirm('Separare i pesi uniti?'))return;const batch=writeBatch(db);o.mergedParts.forEach(p=>{const ref=doc(collection(db,'orders'));batch.set(ref,{day:o.day||today(),table:o.table,meatId:p.meatId,meat:p.meat,price:p.price,grams:p.grams,total:p.total,paid:false,inserted:p.inserted||false,createdAt:serverTimestamp(),createdMs:Date.now()});});batch.delete(doc(db,'orders',id));await batch.commit();};

function historyClosedTime(h){try{const d=h.closedAt?.toDate?h.closedAt.toDate():new Date(h.closedAt||Date.now());return d.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return ''}}
function renderHistory(){let html='<div class="card"><div class="h">Storico Tavoli</div><div class="grid">';for(let i=1;i<=30;i++){const count=history.filter(h=>String(h.table)===String(i)).length;html+=`<button class="btn tableBtn ${historyTable==i?'sel':''}" onclick="selHistoryTable(${i})"><span class="tableNo">${i}</span>${count?`<span class="steak">🧾 ${count}</span>`:'<span class="muted">nessun conto</span>'}</button>`;}html+='</div></div>';if(historyTable){const list=history.filter(h=>String(h.table)===String(historyTable));html+=`<div class="card"><div class="h">Tavolo ${historyTable}</div>`;if(!list.length)html+='<div class="muted">Nessun conto archiviato</div>';list.forEach((h,idx)=>{html+=`<div class="item"><div class="itemHead"><span>🧾 Conto ${list.length-idx}</span><span>${euro(h.total||0)}</span></div><div class="muted">${historyClosedTime(h)} · ${h.closeReason==='new_account'?'Nuovo conto':'Pagato'}</div>${(h.items||[]).map(it=>`<div class="part"><span>🥩 ${it.meat}</span><span>${it.grams} g · ${euro(it.total)}</span></div>`).join('')}</div>`;});html+='</div>';}document.getElementById('history').innerHTML=html;}
window.selHistoryTable=t=>{historyTable=t;renderAll()};
function renderMagazzino(){let html='<div class="card"><div class="h">Magazzino Carni automatico</div>';meats.forEach(m=>html+=`<div class="item ${m.stock<=2?'low':''}"><div class="itemHead"><span>${m.name}</span><span>${m.stock??0} pz</span></div><div class="muted">Vendute oggi: ${m.soldToday||0} ${m.stock<=2?'<span class="warn"> · Scorta bassa</span>':''}</div><div class="actions"><button class="btn small" onclick="setStock('${m.id}')">Aggiorna quantità</button></div></div>`);html+='</div><div class="card"><div class="h">Magazzino Manuale</div><div class="row"><input id="manName" placeholder="Nome articolo"><input id="manQty" type="number" placeholder="Quantità"></div><button class="btn gold" onclick="addManual()">NUOVO ARTICOLO</button>';manual.forEach(x=>html+=`<div class="item"><div class="itemHead"><span>${x.name}</span><span>${x.qty||0}</span></div><div class="actions"><button class="btn small" onclick="manualQty('${x.id}',1)">+1</button><button class="btn small" onclick="manualQty('${x.id}',-1)">-1</button><button class="btn small" onclick="editManual('${x.id}')">Modifica</button><button class="btn small red" onclick="deleteDoc(doc(db,'manualStock','${x.id}'))">Elimina</button></div></div>`);html+='</div>';document.getElementById('magazzino').innerHTML=html;}
window.setStock=async id=>{const m=meats.find(x=>x.id===id);const q=Number(prompt('Quantità frigo per '+m.name,m.stock||0));if(!isNaN(q))await updateDoc(doc(db,'meats',id),{stock:q,initialStock:q});};
window.addManual=async()=>{const n=document.getElementById('manName').value.trim();const q=Number(document.getElementById('manQty').value||0);if(n)await addDoc(collection(db,'manualStock'),{name:n,qty:q,createdAt:serverTimestamp()});};
window.manualQty=(id,n)=>updateDoc(doc(db,'manualStock',id),{qty:increment(n)});window.editManual=async id=>{const x=manual.find(a=>a.id===id);const n=prompt('Nome',x.name);const q=Number(prompt('Quantità',x.qty||0));if(n&&!isNaN(q))await updateDoc(doc(db,'manualStock',id),{name:n,qty:q});};
function renderAdmin(){const sold=orders.filter(o=>o.day===today()&&o.paid);let html='<div class="card"><div class="h">Admin carni/prezzi</div><div class="row"><input id="newMeat" placeholder="Nuova carne"><input id="newPrice" type="number" step="0.01" placeholder="€/etto"></div><button class="btn gold" onclick="addMeat()">AGGIUNGI CARNE</button>';meats.forEach(m=>html+=`<div class="item"><div class="itemHead"><span>${m.name}</span><span>${euro(m.price)}/etto</span></div><div class="actions"><button class="btn small" onclick="editMeat('${m.id}')">Modifica</button><button class="btn small red" onclick="deleteDoc(doc(db,'meats','${m.id}'))">Elimina</button></div></div>`);html+=`</div><div class="card"><div class="h">Statistiche oggi</div><div class="stat"><div><b>${orders.filter(o=>o.day===today()).length}</b>Carni pesate</div><div><b>${euro(orders.filter(o=>o.day===today()).reduce((s,o)=>s+(o.total||0),0))}</b>Totale</div><div><b>${sold.length}</b>Carni pagate</div><div><b>${Math.round(orders.filter(o=>o.day===today()).reduce((s,o)=>s+(o.grams||0),0)/1000*10)/10} kg</b>Peso totale</div></div><button class="btn red" style="width:100%;margin-top:12px" onclick="resetToday()">AZZERA SERVIZIO DI OGGI</button></div>`;document.getElementById('admin').innerHTML=html;}
window.addMeat=async()=>{const n=document.getElementById('newMeat').value.trim();const p=Number(document.getElementById('newPrice').value);if(n&&p)await addDoc(collection(db,'meats'),{name:n,price:p,stock:0,initialStock:0,soldToday:0,autoStock:true,createdAt:serverTimestamp()});};
window.editMeat=async id=>{const m=meats.find(x=>x.id===id);const n=prompt('Nome carne',m.name);const p=Number(prompt('Prezzo €/etto',m.price));if(n&&p)await updateDoc(doc(db,'meats',id),{name:n,price:p});};
window.resetToday=async()=>{if(!confirm('Cancellare ordini di oggi? Magazzino e prezzi restano salvati.'))return;const batch=writeBatch(db);orders.filter(o=>o.day===today()).forEach(o=>batch.delete(doc(db,'orders',o.id)));await batch.commit();};
function renderAll(){renderGriglia();renderCassa();renderHistory();renderMagazzino();renderAdmin();}
renderAll();
</script>
</body></html>
