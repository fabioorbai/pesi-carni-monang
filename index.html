<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pesi Carni Monang V9</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#090909;--card:#171717;--card2:#222;--txt:#fff;--muted:#bdbdbd;--gold:#d8b35a;--green:#28c76f;--red:#ff4d4d;--blue:#2388ff;--line:#333}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:980px;margin:0 auto;padding:14px}.top{display:flex;align-items:center;gap:12px;justify-content:center}.logo{height:62px;object-fit:contain}.title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;color:var(--gold)}.status{text-align:center;margin:6px 0 14px;color:var(--green);font-weight:800}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.tab{border:1px solid var(--line);background:var(--card2);color:#fff;padding:13px 8px;border-radius:12px;font-weight:900;font-size:15px}.tab.active{background:var(--gold);color:#111}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0}.h{font-size:20px;font-weight:900;color:var(--gold);margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.btn{border:0;border-radius:12px;padding:13px 10px;font-weight:900;background:#2b2b2b;color:#fff;font-size:16px}.btn.sel{background:var(--gold);color:#111}.btn.blue{background:var(--blue)}.btn.green{background:var(--green);color:#061}.btn.red{background:var(--red);color:#fff}.btn.gold{background:var(--gold);color:#111}.btn.small{font-size:13px;padding:9px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}input,select{width:100%;background:#0f0f0f;color:#fff;border:1px solid #444;border-radius:12px;padding:13px;font-size:18px;font-weight:800}.bigTotal{text-align:center;font-size:36px;font-weight:900;color:var(--gold);padding:12px}.item{background:#111;border:1px solid #333;border-radius:14px;padding:12px;margin:8px 0}.itemHead{display:flex;justify-content:space-between;gap:8px;font-weight:900}.muted{color:var(--muted);font-size:13px}.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#333;font-size:12px}.warn{color:#ffcb45;font-weight:900}.low{border-color:#ffcb45}.hidden{display:none}.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat div{background:#111;border:1px solid #333;border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:22px;color:var(--gold)}@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}.tabs{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.title{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><img class="logo" src="logo.png"><div><div class="title">PESI CARNI MONANG</div><div id="status" class="status">COLLEGAMENTO...</div></div></div>
 <div class="tabs">
  <button class="tab active" onclick="show('griglia',this)">GRIGLIA</button><button class="tab" onclick="show('cassa',this)">CASSA</button><button class="tab" onclick="show('magazzino',this)">MAGAZZINO</button><button class="tab" onclick="show('admin',this)">ADMIN</button>
 </div>
 <section id="griglia"></section><section id="cassa" class="hidden"></section><section id="magazzino" class="hidden"></section><section id="admin" class="hidden"></section>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, writeBatch, increment } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyAfTggVVuS4atu0-k9ogfxexkUIGhY20J8",authDomain:"pesi-carni-monang.firebaseapp.com",projectId:"pesi-carni-monang",storageBucket:"pesi-carni-monang.firebasestorage.app",messagingSenderId:"957161248371",appId:"1:957161248371:web:7e11ab9dedf84563073c06"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);document.getElementById('status').textContent='ONLINE - SINCRONIZZATO';
let meats=[],orders=[],manual=[],selectedTable=null,selectedMeat=null,selectedIds=new Set();
const today=()=>new Date().toISOString().slice(0,10);const euro=n=>'€ '+(Number(n)||0).toFixed(2).replace('.',',');const total=(g,p)=>Math.round((g/100*p)*100)/100;
const defaultMeats=[['Tomahawk',7.90,0],['Fiorentina',8.50,0],['Costata',6.90,0],['T-Bone',7.50,0],['Controfiletto',8.90,0],['Filetto',9.90,0],['Picanha',6.90,0],['Entrecôte',7.50,0],['Canguro',6.50,0]];
async function seed(){const snap=await getDocs(collection(db,'meats'));if(snap.empty){for(const [name,price,stock] of defaultMeats) await addDoc(collection(db,'meats'),{name,price,stock,initialStock:stock,autoStock:true,createdAt:serverTimestamp()});}}
seed();
onSnapshot(query(collection(db,'meats'),orderBy('name')),s=>{meats=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
onSnapshot(query(collection(db,'manualStock'),orderBy('name')),s=>{manual=s.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
window.show=(id,el)=>{document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderAll();};
function activeOrders(){return orders.filter(o=>o.day===today()&&!o.paid)}
function tableHas(t){return activeOrders().some(o=>String(o.table)===String(t))}
function renderGriglia(){let html='<div class="card"><div class="h">1. Tavolo</div><div class="grid">';for(let i=1;i<=30;i++)html+=`<button class="btn ${selectedTable==i?'sel':''} ${tableHas(i)?'blue':''}" onclick="selTable(${i})">${i}</button>`;html+='</div></div><div class="card"><div class="h">2. Carne</div><div class="grid">';meats.forEach(m=>html+=`<button class="btn ${selectedMeat===m.id?'sel':''}" onclick="selMeat('${m.id}')">${m.name}<br><span class="muted">${euro(m.price)}/etto ${m.stock<=2?'⚠️':''}</span></button>`);html+=`</div></div><div class="card"><div class="h">3. Peso</div><input id="peso" type="number" inputmode="numeric" placeholder="Grammi" oninput="calcPreview()"><div id="preview" class="bigTotal">€ 0,00</div><button class="btn gold" style="width:100%" onclick="sendOrder()">INVIA ALLA CASSA</button></div>`;if(selectedTable){const list=orders.filter(o=>String(o.table)===String(selectedTable)&&o.day===today()&&!o.paid);html+=`<div class="card"><div class="h">Storico tavolo ${selectedTable}</div>${list.length?list.map(orderHtml).join(''):'<div class="muted">Nessuna carne attiva</div>'}</div>`}document.getElementById('griglia').innerHTML=html;calcPreview();}
window.selTable=t=>{selectedTable=t;renderAll()};window.selMeat=id=>{selectedMeat=id;renderAll()};window.calcPreview=()=>{const m=meats.find(x=>x.id===selectedMeat);const g=Number(document.getElementById('peso')?.value||0);const p=document.getElementById('preview');if(p)p.textContent=euro(m?total(g,m.price):0)};
window.sendOrder=async()=>{const m=meats.find(x=>x.id===selectedMeat);const g=Number(document.getElementById('peso')?.value||0);if(!selectedTable||!m||!g)return alert('Seleziona tavolo, carne e peso');await addDoc(collection(db,'orders'),{day:today(),table:selectedTable,meatId:m.id,meat:m.name,price:m.price,grams:g,total:total(g,m.price),paid:false,inserted:false,createdAt:serverTimestamp()});await updateDoc(doc(db,'meats',m.id),{stock:increment(-1),soldToday:increment(1)});document.getElementById('peso').value='';calcPreview();};
function orderHtml(o,check=false){return `<div class="item"><div class="itemHead"><span>${check?`<input type="checkbox" ${selectedIds.has(o.id)?'checked':''} onchange="tog('${o.id}',this.checked)">`:''} Tavolo ${o.table} - ${o.meat}</span><span>${euro(o.total)}</span></div><div class="muted">${o.grams} g · ${euro(o.price)}/etto ${o.inserted?'· inserito':''}</div><div class="actions"><button class="btn small green" onclick="markInserted('${o.id}')">Inserito</button><button class="btn small" onclick="editOrder('${o.id}')">Modifica</button><button class="btn small" onclick="changeTable('${o.id}')">Cambia tavolo</button><button class="btn small red" onclick="delOrder('${o.id}')">Elimina</button></div></div>`}
function renderCassa(){const list=activeOrders().sort((a,b)=>a.table-b.table);let html='<div class="card"><div class="h">Da inserire in cassa</div>';html+=list.length?list.map(o=>orderHtml(o,true)).join(''):'<div class="muted">Nessun ordine</div>';html+=`<div class="actions"><button class="btn gold" onclick="mergeSelected()">UNISCI SELEZIONATI</button></div></div><div class="card"><div class="h">Tavoli attivi</div>`;[...new Set(list.map(o=>o.table))].sort((a,b)=>a-b).forEach(t=>{const l=list.filter(o=>o.table==t);html+=`<div class="item"><b>Tavolo ${t}</b><div class="muted">${l.length} carni · ${euro(l.reduce((s,o)=>s+o.total,0))}</div><button class="btn green small" onclick="payTable(${t})">Pagato / libera tavolo</button></div>`});html+='</div>';document.getElementById('cassa').innerHTML=html;}
window.tog=(id,val)=>{val?selectedIds.add(id):selectedIds.delete(id)};window.markInserted=id=>updateDoc(doc(db,'orders',id),{inserted:true});
window.changeTable=async id=>{const n=prompt('Nuovo tavolo (1-30)');if(n&&Number(n)>=1&&Number(n)<=30)await updateDoc(doc(db,'orders',id),{table:Number(n)});};
window.editOrder=async id=>{const o=orders.find(x=>x.id===id);const mName=prompt('Carne',o.meat);if(!mName)return;const g=Number(prompt('Peso grammi',o.grams));if(!g)return;let m=meats.find(x=>x.name.toLowerCase()===mName.toLowerCase())||meats.find(x=>x.id===o.meatId);await updateDoc(doc(db,'orders',id),{meat:mName,meatId:m?.id||o.meatId,price:m?.price||o.price,grams:g,total:total(g,m?.price||o.price)});};
window.delOrder=async id=>{const o=orders.find(x=>x.id===id);if(confirm('Eliminare ordine?')){await deleteDoc(doc(db,'orders',id));if(o?.meatId)await updateDoc(doc(db,'meats',o.meatId),{stock:increment(1),soldToday:increment(-1)});}};
window.payTable=async t=>{if(!confirm('Liberare tavolo '+t+'?'))return;const batch=writeBatch(db);activeOrders().filter(o=>o.table==t).forEach(o=>batch.update(doc(db,'orders',o.id),{paid:true,paidAt:serverTimestamp()}));await batch.commit();};
window.mergeSelected=async()=>{const ids=[...selectedIds];if(ids.length<2)return alert('Seleziona almeno 2 righe');const sel=orders.filter(o=>ids.includes(o.id));const first=sel[0];const grams=sel.reduce((s,o)=>s+Number(o.grams),0);const tot=sel.reduce((s,o)=>s+Number(o.total),0);await addDoc(collection(db,'orders'),{day:today(),table:first.table,meatId:first.meatId,meat:first.meat+' x'+sel.length,price:first.price,grams,total:tot,paid:false,inserted:false,createdAt:serverTimestamp(),merged:true});const batch=writeBatch(db);sel.forEach(o=>batch.delete(doc(db,'orders',o.id)));await batch.commit();selectedIds.clear();};
function renderMagazzino(){let html='<div class="card"><div class="h">Magazzino Carni automatico</div>';meats.forEach(m=>html+=`<div class="item ${m.stock<=2?'low':''}"><div class="itemHead"><span>${m.name}</span><span>${m.stock??0} pz</span></div><div class="muted">Vendute oggi: ${m.soldToday||0} ${m.stock<=2?'<span class="warn"> · Scorta bassa</span>':''}</div><div class="actions"><button class="btn small" onclick="setStock('${m.id}')">Aggiorna quantità</button></div></div>`);html+='</div><div class="card"><div class="h">Magazzino Manuale</div><div class="row"><input id="manName" placeholder="Nome articolo"><input id="manQty" type="number" placeholder="Quantità"></div><button class="btn gold" onclick="addManual()">NUOVO ARTICOLO</button>';manual.forEach(x=>html+=`<div class="item"><div class="itemHead"><span>${x.name}</span><span>${x.qty||0}</span></div><div class="actions"><button class="btn small" onclick="manualQty('${x.id}',1)">+1</button><button class="btn small" onclick="manualQty('${x.id}',-1)">-1</button><button class="btn small" onclick="editManual('${x.id}')">Modifica</button><button class="btn small red" onclick="deleteDoc(doc(db,'manualStock','${x.id}'))">Elimina</button></div></div>`);html+='</div>';document.getElementById('magazzino').innerHTML=html;}
window.setStock=async id=>{const m=meats.find(x=>x.id===id);const q=Number(prompt('Quantità frigo per '+m.name,m.stock||0));if(!isNaN(q))await updateDoc(doc(db,'meats',id),{stock:q,initialStock:q});};
window.addManual=async()=>{const n=document.getElementById('manName').value.trim();const q=Number(document.getElementById('manQty').value||0);if(n)await addDoc(collection(db,'manualStock'),{name:n,qty:q,createdAt:serverTimestamp()});};
window.manualQty=(id,n)=>updateDoc(doc(db,'manualStock',id),{qty:increment(n)});window.editManual=async id=>{const x=manual.find(a=>a.id===id);const n=prompt('Nome',x.name);const q=Number(prompt('Quantità',x.qty||0));if(n&&!isNaN(q))await updateDoc(doc(db,'manualStock',id),{name:n,qty:q});};
function renderAdmin(){const sold=orders.filter(o=>o.day===today()&&o.paid);let html='<div class="card"><div class="h">Admin carni/prezzi</div><div class="row"><input id="newMeat" placeholder="Nuova carne"><input id="newPrice" type="number" step="0.01" placeholder="€/etto"></div><button class="btn gold" onclick="addMeat()">AGGIUNGI CARNE</button>';meats.forEach(m=>html+=`<div class="item"><div class="itemHead"><span>${m.name}</span><span>${euro(m.price)}/etto</span></div><div class="actions"><button class="btn small" onclick="editMeat('${m.id}')">Modifica</button><button class="btn small red" onclick="deleteDoc(doc(db,'meats','${m.id}'))">Elimina</button></div></div>`);html+=`</div><div class="card"><div class="h">Statistiche oggi</div><div class="stat"><div><b>${orders.filter(o=>o.day===today()).length}</b>Carni pesate</div><div><b>${euro(orders.filter(o=>o.day===today()).reduce((s,o)=>s+(o.total||0),0))}</b>Totale</div><div><b>${sold.length}</b>Carni pagate</div><div><b>${Math.round(orders.filter(o=>o.day===today()).reduce((s,o)=>s+(o.grams||0),0)/1000*10)/10} kg</b>Peso totale</div></div><button class="btn red" style="width:100%;margin-top:12px" onclick="resetToday()">AZZERA SERVIZIO DI OGGI</button></div>`;document.getElementById('admin').innerHTML=html;}
window.addMeat=async()=>{const n=document.getElementById('newMeat').value.trim();const p=Number(document.getElementById('newPrice').value);if(n&&p)await addDoc(collection(db,'meats'),{name:n,price:p,stock:0,initialStock:0,soldToday:0,autoStock:true,createdAt:serverTimestamp()});};
window.editMeat=async id=>{const m=meats.find(x=>x.id===id);const n=prompt('Nome carne',m.name);const p=Number(prompt('Prezzo €/etto',m.price));if(n&&p)await updateDoc(doc(db,'meats',id),{name:n,price:p});};
window.resetToday=async()=>{if(!confirm('Cancellare ordini di oggi? Magazzino e prezzi restano salvati.'))return;const batch=writeBatch(db);orders.filter(o=>o.day===today()).forEach(o=>batch.delete(doc(db,'orders',o.id)));await batch.commit();};
function renderAll(){renderGriglia();renderCassa();renderMagazzino();renderAdmin();}
renderAll();
</script>
</body></html>
