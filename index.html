const min=t=>{if(!t)return 0;let[a,b]=t.split(':').map(Number);return a*60+b};const nowMin=()=>new Date().getHours()*60+new Date().getMinutes();const bTables=b=>(b.tables&&b.tables.length?b.tables:[b.table].filter(Boolean)).map(Number);const active=b=>b.date===selectedDate&&!['done','deleted','paid','noshow'].includes(b.status);const day=()=>bookings.filter(b=>b.date===selectedDate&&b.status!=='deleted');const start=b=>min(b.time||'19:00');const end=b=>min(b.endTime||b.end||'23:59')||1439;function overlaps(a1,a2,b1,b2){return a1<b2&&b1<a2}function conflicts(ids,s,e,ignore){return day().filter(active).filter(b=>b.id!==ignore&&b.status!=='waiting'&&bTables(b).some(id=>ids.includes(id))&&overlaps(s,e,start(b),end(b)))}function cap(ids,ext){let c=ids.reduce((s,id)=>s+(tables.find(t=>t.id==id)?.seats||0),0);return ext?Math.max(c,20):c}function currentForTable(id){let list=day().filter(active).filter(b=>b.status!=='waiting'&&bTables(b).includes(id)).sort((a,b)=>start(a)-start(b));let n=nowMin();return list.find(b=>start(b)<=n&&end(b)>n)||list[0]||null}function tableStatus(id){let b=currentForTable(id);if(!b)return 'free';if(b.status==='blocked')return'blocked';if(b.status==='occupied')return'occupied';if(b.status==='arriving')return'arriving';return'reserved'}function fmtDate(d){let x=new Date(d+'T12:00');return x.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).toUpperCase()}

function timer(iso){let ms=Date.now()-new Date(iso).getTime(),m=Math.max(0,Math.floor(ms/60000));return Math.floor(m/60)+'h '+pad(m%60)+'m'}function statBookings(){return day().filter(b=>!['deleted','blocked','noshow'].includes(b.status))}function realCovers(){return statBookings().filter(b=>b.status!=='waiting').reduce((s,b)=>s+Number(b.people||0),0)}function renderStats(){let mapActive=day().filter(active),all=statBookings(),wt=all.filter(b=>b.status==='waiting'),res=all.filter(b=>['reserved','arriving'].includes(b.status)),occ=all.filter(b=>b.status==='occupied'),done=all.filter(b=>['done','paid'].includes(b.status));let used=new Set(mapActive.filter(b=>b.status!=='waiting').flatMap(bTables));sFree.textContent=25-used.size;sRes.textContent=res.length;sOcc.textContent=occ.length;sWait.textContent=wt.length;sCov.textContent=realCovers()}
function waitList(){return day().filter(active).filter(b=>b.status==='waiting').sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''))}function waitMin(b){return Math.max(0,Math.round((Date.now()-new Date(b.createdAt||Date.now()).getTime())/60000))}function waitHTML(b,btn=''){return `<div class="waitcard ${waitMin(b)>20?'hot':''}"><b>${b.name||'Cliente'}</b><div class="meta">👥 ${b.people} coperti · attesa ${waitMin(b)} min · ${b.zone==='inside'?'Interno':b.zone==='outside'?'Esterno':'Qualsiasi'}<br>${b.phone||''}</div>${btn}</div>`}function renderWait(){let l=waitList();waitPanel.innerHTML=l.length?l.slice(0,8).map(b=>waitHTML(b)).join(''):'<p class="meta">Nessuno in attesa.</p>';if(waitDlg.open)renderWaitFull()}
window.openWaiting=()=>{wname.value='';wphone.value='';wpeople.value=2;wzone.value='any';wnotes.value='';renderWaitFull();waitDlg.showModal()};window.addWait=async()=>{let b={id:String(Date.now()),date:selectedDate,name:wname.value||'Cliente in attesa',phone:wphone.value||'',people:+wpeople.value||1,zone:wzone.value,time:new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),endTime:'',status:'waiting',notes:wnotes.value||'',createdAt:new Date().toISOString(),tables:[]};bookings.push(b);await persist(b);render()};function renderWaitFull(){let l=waitList();waitFull.innerHTML='<h3 class="title">In ordine d’arrivo</h3>'+(l.length?l.map(b=>waitHTML(b,`<div class="actions"><button class="btn small" onclick="assignWait('${b.id}')">Assegna</button><button class="btn small danger" onclick="removeWait('${b.id}')">Rimuovi</button></div>`)).join(''):'<p class="meta">Nessuno in attesa.</p>')}window.removeWait=async(id)=>{let b=bookings.find(x=>x.id===id);if(b){b.status='deleted';await persist(b);render()}};window.assignWait=id=>{let b=bookings.find(x=>x.id===id);openBooking(b)};
function openBooking(data=null){selectedTables=[];bid.value=data?.id||'';bname.value=data?.name||'';bphone.value=data?.phone||'';bpeople.value=data?.people||2;bzone.value=data?.zone||'any';btime.value=data?.time||'20:00';bend.value=data?.endTime||'22:00';bstatus.value=data?.status==='waiting'?'occupied':data?.status||'reserved';bext.value=data?.extension?'yes':'no';bnotes.value=data?.notes||'';fcane.checked=!!data?.flags?.cane;fceliaco.checked=!!data?.flags?.celiaco;fcomp.checked=!!data?.flags?.compleanno;fsegg.checked=!!data?.flags?.seggiolone;fvip.checked=!!data?.flags?.vip;selectedTables=[...new Set(bTables(data||{}))];bmulti.checked=selectedTables.length>1;deleteBtn.style.display=data?'inline-block':'none';bookTitle.textContent=data?'Modifica prenotazione':'Nuova prenotazione';updateTableChoices();bookDlg.showModal()}window.openBooking=openBooking;
function updateTableChoices(){let s=min(btime.value),e=min(bend.value),ignore=bid.value,zone=bzone.value,people=+bpeople.value||1,ext=bext.value==='yes';let html=tables.filter(t=>zone==='any'||t.zone===zone).map(t=>{let busy=conflicts([t.id],s,e,ignore).length>0;let sel=selectedTables.includes(t.id);let ok=people<=cap([t.id],ext)||ext;return `<button type="button" class="btn small ${sel?'selected':''} ${busy?'busy':''}" ${busy?'disabled':''} onclick="toggleTable(${t.id})">${t.id}${ok?'':' ⚠️'}</button>`}).join('');tableChoices.innerHTML=html;let c=conflicts(selectedTables,s,e,ignore);conflictMsg.textContent=c.length?'⚠️ Sovrapposizione con: '+c.map(x=>`${x.time}-${x.endTime} ${x.name} tav. ${bTables(x).join('+')}`).join(', '):''}window.updateTableChoices=updateTableChoices;window.toggleTable=id=>{if(bmulti && !bmulti.checked){selectedTables=selectedTables.includes(id)?[]:[id];}else{selectedTables=selectedTables.includes(id)?selectedTables.filter(x=>x!==id):[...selectedTables,id];selectedTables=[...new Set(selectedTables)];}updateTableChoices()};
window.saveBooking=async()=>{if(!bname.value.trim())return alert('Inserisci il nome');if(!selectedTables.length)return alert('Scegli almeno un tavolo');let s=min(btime.value),e=min(bend.value);if(e<=s)return alert('L’orario di uscita deve essere dopo l’arrivo');let c=conflicts(selectedTables,s,e,bid.value);if(c.length)return alert('Attenzione: il tavolo è già occupato in questa fascia oraria.');let id=bid.value||String(Date.now());let old=bookings.find(b=>b.id===id);let b={...(old||{}),id,date:selectedDate,name:bname.value.trim(),phone:bphone.value.trim(),people:+bpeople.value||1,zone:bzone.value,time:btime.value,endTime:bend.value,status:bstatus.value,tables:selectedTables,table:selectedTables[0],extension:bext.value==='yes',notes:bnotes.value,flags:{cane:fcane.checked,celiaco:fceliaco.checked,compleanno:fcomp.checked,seggiolone:fsegg.checked,vip:fvip.checked},createdAt:old?.createdAt||new Date().toISOString()};if(b.status==='occupied'&&!b.seatedAt)b.seatedAt=new Date().toISOString();if(old)bookings=bookings.map(x=>x.id===id?b:x);else bookings.push(b);await persist(b);bookDlg.close();render()};window.deleteBooking=async()=>{let id=bid.value;if(!id)return;if(confirm('Eliminare questa prenotazione?')){bookings=bookings.map(b=>b.id===id?{...b,status:'deleted'}:b);await persist(bookings.find(b=>b.id===id));bookDlg.close();render()}};
function openTable(id){let t=tables.find(x=>x.id===id),list=day().filter(active).filter(b=>b.status!=='waiting'&&bTables(b).includes(id)).sort((a,b)=>start(a)-start(b));let html=`<h2>Tavolo ${id}</h2><p class="meta">${t.zone==='inside'?'Interno':'Esterno'} · ${t.seats} posti base</p>`;if(!list.length)html+='<p>Tavolo libero.</p>';else html+=list.map(b=>`<div class="rescard"><div><b>${b.time} - ${b.endTime||'?'} · ${b.name}</b><div class="meta">${b.people} coperti · ${label(b.status)} · tavoli ${bTables(b).join(' + ')}<br>${b.phone||''}<br>${b.notes||''}</div></div><div><button class="btn small" onclick="openBookingById('${b.id}')">Modifica</button></div></div>`).join('');html+=`<div class="actions"><button class="btn primary" onclick="newOnTable(${id})">+ Prenota qui</button><button class="btn" onclick="moveFirst(${id})">Sposta</button><button class="btn ok" onclick="seatFirst(${id})">Fai accomodare</button><button class="btn danger" onclick="freeTable(${id})">Libera</button><button class="btn" onclick="blockTable(${id})">Blocca</button></div>`;let comps=compatibleWait(id);if(comps.length)html+='<hr><h3 class="title">Attesa compatibile</h3>'+comps.map(b=>waitHTML(b,`<button class="btn small primary" onclick="seatWaitTo('${b.id}',${id})">Assegna e fai accomodare</button>`)).join('');tableContent.innerHTML=html;tableDlg.showModal()}window.openTable=openTable;function label(s){return{reserved:'Prenotato',arriving:'Sta arrivando',occupied:'Seduto',waiting:'Attesa',blocked:'Bloccato',paid:'Pagato',noshow:'No-show'}[s]||s}window.openBookingById=id=>openBooking(bookings.find(b=>b.id===id));window.newOnTable=id=>{openBooking({tables:[id],people:tables.find(t=>t.id===id).seats,zone:tables.find(t=>t.id===id).zone});try{tableDlg.close()}catch(e){}};window.seatFirst=async(id)=>{let b=day().filter(active).filter(x=>bTables(x).includes(id)&&['reserved','arriving'].includes(x.status)).sort((a,b)=>start(a)-start(b))[0];if(!b)return alert('Nessuna prenotazione da accomodare');b.status='occupied';b.seatedAt=new Date().toISOString();await persist(b);tableDlg.close();render()};window.freeTable=async(id)=>{let list=day().filter(active).filter(b=>b.status==='occupied'&&bTables(b).includes(id));for(let b of list){b.status='done';b.freedAt=new Date().toISOString();await persist(b)}tableDlg.close();render();let comps=compatibleWait(id);if(comps.length){setTimeout(()=>{openTable(id)},200)}};window.blockTable=async(id)=>{let b={id:'block-'+selectedDate+'-'+id,date:selectedDate,name:'BLOCCATO',people:0,zone:tables.find(t=>t.id===id).zone,time:'00:00',endTime:'23:59',status:'blocked',tables:[id],notes:'Tavolo bloccato',createdAt:new Date().toISOString()};bookings.push(b);await persist(b);tableDlg.close();render()};function compatibleWait(id){let t=tables.find(x=>x.id===id);return waitList().filter(b=>(b.zone==='any'||b.zone===t.zone)&&(+b.people||0)<=Math.max(t.seats,20)).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''))}window.seatWaitTo=async(bid,id)=>{let b=bookings.find(x=>x.id===bid);b.status='occupied';b.tables=[id];b.table=id;b.time=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});b.endTime=b.endTime||'23:00';b.seatedAt=new Date().toISOString();await persist(b);tableDlg.close();render()};window.moveFirst=id=>{let b=day().filter(active).find(x=>bTables(x).includes(id)&&x.status!=='waiting');if(!b)return alert('Nessuna prenotazione da spostare');openBooking(b);try{tableDlg.close()}catch(e){}};
window.openFind=()=>{openBooking({people:2,time:'20:00',endTime:'22:00',zone:'any'})};
window.showTab=(tab,set=true)=>{if(set)currentTab=tab;['Sala','Pren','Attesa','Serata','Stats'].forEach(n=>$('n'+n).classList.remove('active'));$({sala:'nSala',pren:'nPren',attesa:'nAttesa',serata:'nSerata',stats:'nStats'}[tab]).classList.add('active');if(tab==='sala'){page.innerHTML='';return}if(tab==='pren'){let l=day().filter(b=>b.status!=='deleted'&&b.status!=='waiting').sort((a,b)=>start(a)-start(b));page.innerHTML='<section class="panel" style="margin-top:14px"><h3 class="title">Prenotazioni del giorno</h3>'+l.map(b=>`<div class="rescard"><div><b>${b.time}-${b.endTime||'?'} ${b.name}</b><div class="meta">${b.people} coperti · ${label(b.status)} · tav. ${bTables(b).join('+')||'-'}</div></div><button class="btn small" onclick="openBookingById('${b.id}')">Modifica</button></div>`).join('')+'</section>'}if(tab==='attesa'){page.innerHTML='<section class="panel" style="margin-top:14px"><h3 class="title">Lista d’attesa</h3>'+waitList().map(b=>waitHTML(b,`<button class="btn small" onclick="assignWait('${b.id}')">Assegna</button>`)).join('')+'</section>'}if(tab==='serata'){let st=19*60,en=24*60,total=en-st;page.innerHTML='<section class="panel" style="margin-top:14px"><h3 class="title">Vista serata</h3>'+tables.map(t=>{let bl=day().filter(active).filter(b=>b.status!=='waiting'&&bTables(b).includes(t.id)).map(b=>{let l=Math.max(0,(start(b)-st)/total*100),w=Math.max(4,(end(b)-start(b))/total*100);return `<div class="block ${b.status==='occupied'?'occupied':''}" style="left:${l}%;width:${w}%">${b.time} ${b.name}</div>`}).join('');return `<div class="service-row"><b>${t.id}</b><div class="service-line">${bl}</div></div>`}).join('')+'</section>'}if(tab==='stats'){let all=statBookings(),a=all.filter(b=>b.status!=='waiting'),times=['19:00','19:30','20:00','20:30','21:00','21:30','22:00','22:30','23:00'],max=Math.max(1,...times.map(t=>a.filter(b=>b.time===t).reduce((s,b)=>s+(+b.people||0),0)));let real=realCovers(),seduti=a.filter(b=>b.status==='occupied').reduce((s,b)=>s+(+b.people||0),0),liberati=a.filter(b=>['done','paid'].includes(b.status)).reduce((s,b)=>s+(+b.people||0),0),pren=a.filter(b=>['reserved','arriving'].includes(b.status)).reduce((s,b)=>s+(+b.people||0),0),att=waitList().reduce((s,b)=>s+(+b.people||0),0);page.innerHTML='<section class="panel" style="margin-top:14px"><h3 class="title">Statistiche reali serata</h3><p class="meta">I coperti totali non scendono quando liberi un tavolo: vengono contati anche seduti, pagati e già liberati.</p><div class="stats">'+`<div class="stat">Coperti totali <b>${real}</b></div><div class="stat">Prenotati <b>${pren}</b></div><div class="stat">Seduti <b>${seduti}</b></div><div class="stat">Liberati/Pagati <b>${liberati}</b></div><div class="stat">Attesa <b>${att}</b></div><div class="stat">Prenotazioni <b>${a.length}</b></div><div class="stat">No-show <b>${day().filter(b=>b.status==='noshow').length}</b></div>`+'</div><h3 class="title">Coperti per orario</h3><div class="bars">'+times.map(t=>{let c=a.filter(b=>b.time===t).reduce((s,b)=>s+(+b.people||0),0);return `<div class="barrow"><b>${t}</b><div class="bar"><i style="width:${c/max*100}%"></i></div><span>${c}</span></div>`}).join('')+'</div></section>'}}
render();setInterval(render,60000);
</script><script>if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}</script></body></html>
